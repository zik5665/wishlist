<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш Семейный Вишлист</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> Вишлист</h1>
    <div class="top-menu">
        <button class="settings-btn" onclick="toggleSettings()">⚙️ Настройки ▼</button>

        <select id="categoryFilter" class="settings-btn" onchange="filterByCategory(this.value)" style="margin-left: 10px; cursor: pointer; outline: none;">
            <option value="all">📁 Все категории</option>
            <option value="Техника">💻 Техника</option>
            <option value="Вкусняшки">🍬 Вкусняшки</option>
            <option value="Украшения">💍 Украшения</option>
            <option value="Безделушки">🧸 Безделушки</option>
            <option value="Прочее">📦 Прочее</option>
        </select>

        <div id="settingsDropdown" class="settings-dropdown-content">
            <label style="cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; margin-bottom: 5px;">
                🎨 Цвет окон
                <input type="color" id="themeColorPicker" value="#ffffff" style="border: none; width: 30px; height: 30px; cursor: pointer; padding: 0; background: transparent;">
            </label>

            <button onclick="filterWishes('all')">👀 Показывать всё</button>
            <button onclick="filterWishes('husband')">🧔 Только Мишины</button>
            <button onclick="filterWishes('wife')">👩 Только Катюшины</button>
        </div>
    </div>

    <div class="input-container" style="flex-direction: column;">

        <input type="text" id="wishInput" placeholder="Название (например: Робот-пылесос)">

        <input type="text" id="linkInput" placeholder="Ссылка на товар (Озон, WB...)">

        <select id="categoryInput" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; font-family: 'Nunito', sans-serif; color: #747d8c; outline: none;">
            <option value="Прочее" selected>📦 Прочее (По умолчанию)</option>
            <option value="Техника">💻 Техника</option>
            <option value="Вкусняшки">🍬 Вкусняшки</option>
            <option value="Украшения">💍 Украшения</option>
            <option value="Безделушки">🧸 Безделушки</option>
        </select>

        <div class="file-upload-wrapper">
            <input type="file" id="imageInput" accept="image/*" class="hidden-file-input">
            <label for="imageInput" class="custom-file-button">📷 Прикрепить фото</label>
            <span id="fileName" class="file-name-text">Файл не выбран</span>
        </div>

        <div style="display: flex; gap: 10px; width: 100%; margin-top: 10px;">
            <button class="btn-husband" onclick="addWish('муж')" style="flex: 1;">Добавить Мише</button>
            <button class="btn-wife" onclick="addWish('жена')" style="flex: 1;">Добавить Катюше</button>
        </div>

        <div id="uploadStatus" style="color: gray; font-size: 12px; margin-top: 5px; text-align: center;"></div>
    </div>

    <div class="lists-wrapper">

        <!-- Карточка Миши (с id для меню настроек и с аватаркой) -->
        <div class="list-card" id="husbandCard">
            <h2 class="title-husband">
                <img src="img/husband.png" class="avatar-icon" alt="Муж">
                Миша
            </h2>
            <ul class="wish-list" id="husbandList"></ul>
        </div>

        <!-- Карточка Катюши (с id для меню настроек и с аватаркой) -->
        <div class="list-card wife-card" id="wifeCard">
            <h2 class="title-wife">
                <img src="img/wife.png" class="avatar-icon" alt="Жена">
                Катюша
            </h2>
            <ul class="wish-list" id="wifeList"></ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
